<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take Orders</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container split-layout">
    <div>
      <h1>Take Order</h1>
      <div id="menu" class="menu-grid"></div>
    </div>

    <div class="card basket-card">
      <h2>Current Order</h2>
      <ul id="cart"></ul>
      <h3>Total: £<span id="total">0.00</span></h3>
      <button class="action-btn green" id="placeOrderBtn">Place Order</button>
    </div>
  </div>

  <script type="module" src="order.js"></script>
</body>
</html>
